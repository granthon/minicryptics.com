<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Mini Cryptics</h1>
    <p>Small cryptic crosswords by tuber</p>
  </header>
  <main>
    <ol class="puzzle-list">
      {{ range hugo.Data.puzzles }}
        <li>
          <a href="/puzzle/{{ lower .id }}/">
            <span class="puzzle-title">{{ .title }}</span>
	    <span class="puzzle-date">{{ (time.AsTime .date).Format "2 Jan 2006" }}</span>
          </a>
        </li>
      {{ end }}
    </ol>
  </main>
  <footer>
    <p>Puzzles also on <a href="https://crosshare.org/tuber">Crosshare</a></p>
  </footer>
</body>
</html>
